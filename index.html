<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>みくの自己紹介</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #ffeef8, #e0f7ff);
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      max-width: 400px;
      text-align: center;
    }
    h1 {
      color: #ff7eb3;
      margin-bottom: 10px;
    }
    p {
      line-height: 1.6;
    }
    .emoji {
      font-size: 1.5em;
    }
    .footer {
      margin-top: 20px;
      font-size: 0.9em;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>みくです🌷</h1>
    <p>
      毎日ちょっとずつ幸せ更新中🫧<br>
      音楽と笑顔がだいすきです🎧<br><br>
      なんでもない日でも、<br>
      「なんか幸せだな〜」って思える瞬間を大切にしてます🍀<br><br>
      関わってくれる人にも、<br>
      少しでも幸せを届けられたら嬉しいです✨
    </p>
    <div class="footer">Thanks for visiting 💕</div>
  </div>
</body>
</html>
